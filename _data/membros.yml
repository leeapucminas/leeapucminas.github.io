# Laboratory Members

- name: "Gisele Pires de Mendonça Dantas"
  role: "Coordenadora"
  lattes: "http://lattes.cnpq.br/3879172921286504"
  image: "/assets/images/members/gisele.png"
  about: |
    Bióloga graduada pela Universidade Federal de Minas Gerais (UFMG), mestre em Ecologia , Conservação e Manejo da Vida Silvestre pela UFMG e doutora em Genética pela Universidade de São Paulo (USP). Atualmente é professora adjunta da Pontifícia Universidade Católica de Minas Gerais, vinculada ao Programa de Pós-Graduação em Zoologia de Vertebrados. Sua linha de pesquisa engloba ecologia, genética e evolução de aves, principalmente trabalhando com passeriformes de Mata Atlântica e aves marinhas da América do Sul e Antártica.

- name: "Jean C P Oliveira"
